<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Generador de ícono — pr.soda</title>
<style>
  body { font-family: system-ui; background: #f0f0f0; padding: 40px; text-align: center; }
  canvas { border-radius: 20px; box-shadow: 0 4px 20px rgba(0,0,0,.2); margin: 20px; }
  button { padding: 14px 32px; background: #7B9E4A; color: white; border: none;
           border-radius: 10px; font-size: 16px; cursor: pointer; margin-top: 16px; }
  button:hover { background: #5a7835; }
  p { color: #666; margin-top: 12px; font-size: 14px; }
</style>
</head>
<body>
<h2>Ícono para iPhone (apple-touch-icon.png)</h2>
<canvas id="c" width="180" height="180"></canvas>
<br>
<button onclick="download()">⬇ Descargar apple-touch-icon.png</button>
<p>Después de descargarlo, reemplazá el archivo <code>apple-touch-icon.png</code> en la carpeta del proyecto.</p>

<script>
const SVG = `<svg viewBox="0 0 1009.06 510.11" xmlns="http://www.w3.org/2000/svg">
  <path fill="#040404" d="M83.39,348.09c-1.87-3.45-.36-8.92.1-12.26l102.79.81c10.15,24.02,30.51,43.19,56.25,43.3l89.77.35c3.84.01,6.44-3.81,5.12-7.41-22.1-60.47-21.39-123.94.21-183.76,1.29-3.58-1.27-7.36-5.08-7.39l-77.64-.49,95.15-147.68c1.74-2.7.95-6.31-1.77-8.03L309.52.9c-2.68-1.7-6.24-.93-7.97,1.74l-145.03,223.15-125.26.12c-16.61.02-29.94,10.6-31.26,27.41l.25,55.98c.08,17.91,17.3,28.76,34.48,26.53,3.9-.51,9.33.56,9.25,4.57l-.56,26.7c-.3,14.42,29.71,31.21,47.01,49,42.26,43.46,28.37,81.84,46.3,82.71,18.59.91,13.11-35.49,11.42-46.85-6.32-42.51-28.91-78.97-64.76-103.88Z"/>
  <path fill="#040404" d="M559.31,52.58c7.08-.42,13.06,5.3,13.06,12.42v432.67c0,7.08-5.94,12.79-12.98,12.42-85.7-4.73-163.19-57.05-197.86-135.52-26.8-60.6-26.08-129.23.83-189.53,37.55-77.6,111.71-127.3,196.95-132.45Z"/>
  <path fill="#8a9b4a" d="M822.21,78.17l-.15,409.57c0,13.14-12.73,22.18-24.5,22.25l-3.84.11c-13.76-.92-24.8-11.36-24.83-25.76l-.22-137.38-164.17.14c-5.81,0-10.53-4.71-10.53-10.52v-110.52c0-5.81,4.71-10.52,10.52-10.52h164.21s.18-139.44.18-139.44c1.22-12.62,9.3-21.07,21.44-23.06l2.32-.48c15.57-.26,29.56,8.52,29.56,25.61Z"/>
  <rect fill="#8a9b4a" x="831.05" y="112.33" width="53.45" height="338.09" rx="26.72" ry="26.72"/>
  <rect fill="#8a9b4a" x="955.61" y="112.31" width="53.45" height="225.47" rx="26.72" ry="26.72"/>
  <rect fill="#8a9b4a" x="955.61" y="348.51" width="53.45" height="101.9" rx="26.72" ry="26.72"/>
  <rect fill="#8a9b4a" x="893.33" y="52.61" width="53.45" height="457.5" rx="7.06" ry="7.06"/>
</svg>`;

const canvas = document.getElementById('c');
const ctx    = canvas.getContext('2d');

// White background with rounded corners
ctx.fillStyle = '#ffffff';
ctx.fillRect(0, 0, 180, 180);

const blob = new Blob([SVG], { type: 'image/svg+xml' });
const url  = URL.createObjectURL(blob);
const img  = new Image();
img.onload = () => {
  // Center logo with padding: 20px on sides, vertically centered
  const pad = 22;
  const drawW = 180 - pad * 2;
  const drawH = drawW * (240 / 560);
  const drawX = pad;
  const drawY = (180 - drawH) / 2;
  ctx.drawImage(img, drawX, drawY, drawW, drawH);
  URL.revokeObjectURL(url);
};
img.src = url;

function download() {
  const a = document.createElement('a');
  a.download = 'apple-touch-icon.png';
  a.href = canvas.toDataURL('image/png');
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
}
</script>
</body>
</html>
